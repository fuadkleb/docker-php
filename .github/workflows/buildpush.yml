name: CI

on:
  push:
    branches:
      - main
  # optional: also on PRs
  pull_request:

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      php84-cli: ${{ steps.filter.outputs.php84-cli }}
      php84-fpm: ${{ steps.filter.outputs.php84-fpm }}
      php84-fpm-mssql: ${{ steps.filter.outputs.php84-fpm-mssql }}
      php84-fpm-mysql: ${{ steps.filter.outputs.php84-fpm-mysql }}
      php84-fpm-pgsql: ${{ steps.filter.outputs.php84-fpm-pgsql }}
      php84-fpm-nginx-pgsql: ${{ steps.filter.outputs.php84-fpm-nginx-pgsql }}
      php84-fpm-alpine: ${{ steps.filter.outputs.php84-fpm-alpine }}
      php84-franken: ${{ steps.filter.outputs.php84-franken }}
      php85-apache-mssql-pgsql: ${{ steps.filter.outputs.php85-apache-mssql-pgsql }}
      php85-franken: ${{ steps.filter.outputs.php85-franken }}
      php84-apache-mssql-pgsql: ${{ steps.filter.outputs.php84-apache-mssql-pgsql }}
      php83-cli: ${{ steps.filter.outputs.php83-cli }}
      php83-fpm: ${{ steps.filter.outputs.php83-fpm }}
      php82-cli: ${{ steps.filter.outputs.php82-cli }}
      php82-fpm: ${{ steps.filter.outputs.php82-fpm }}
      php82-fpm-nginx-pgsql: ${{ steps.filter.outputs.php82-fpm-nginx-pgsql }}
      php82-apache: ${{ steps.filter.outputs.php82-apache }}
      php82-apache-mssql-pgsql: ${{ steps.filter.outputs.php82-apache-mssql-pgsql }}
      php80-apache-mssql-pgsql: ${{ steps.filter.outputs.php80-apache-mssql-pgsql }}
      php74-apache: ${{ steps.filter.outputs.php74-apache }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            # Build contexts
            php84-cli:
              - '8.4/cli/**'
            php84-fpm:
              - '8.4/fpm/**'
            php84-fpm-mssql:
              - '8.4/fpm-mssql/**'
            php84-fpm-pgsql:
              - '8.4/fpm-pgsql/**'
            php84-fpm-nginx-pgsql:
              - '8.4/fpm-nginx-pgsql/**'
            php84-fpm-mysql:
              - '8.4/fpm-mysql/**'
            php84-fpm-alpine:
              - '8.4/fpm-alpine/**'
            php84-franken:
              - '8.4/franken/**'
            php85-apache-mssql-pgsql:
              - '8.5/apache-mssql-pgsql/**'
            php85-franken:
              - '8.5/franken/**'
            php84-apache-mssql-pgsql:
              - '8.4/apache-mssql-pgsql/**'
            php83-cli:
              - '8.3/cli/**'
            php83-fpm:
              - '8.3/fpm/**'
            php82-cli:
              - '8.2/cli/**'
            php82-fpm:
              - '8.2/fpm/**'
            php82-fpm-nginx-pgsql:
              - '8.2/fpm-nginx-pgsql/**'
            php82-apache:
              - '8.2/apache/**'
            php82-apache-mssql-pgsql:
              - '8.2/apache-mssql-pgsql/**'
            php80-apache-mssql-pgsql:
              - '8.0/apache-mssql-pgsql/**'
            php74-apache:
              - '7.4/apache-pgsql/**'

  # PHP 8.4 Debian
  build-8_4-cli:
    needs: changes
    if: needs.changes.outputs.php84-cli == 'true'
    uses: ./.github/workflows/createtest.mssql.yml
    name: fuadkleb/php-mssql:8.4-cli
    secrets: inherit
    with:
      source-directory: 8.4/cli
      image-tag: fuadkleb/php-mssql:8.4-cli
      platforms: linux/amd64, linux/arm64

  build-8_4-fpm:
    needs: changes
    if: needs.changes.outputs.php84-fpm == 'true'
    uses: ./.github/workflows/createtest.mssql.yml
    name: fuadkleb/php-mssql:8.4-fpm
    secrets: inherit
    with:
      source-directory: 8.4/fpm
      image-tag: fuadkleb/php-mssql:8.4-fpm
      platforms: linux/amd64, linux/arm64

  build-8_4-fpm-mssql:
    needs: changes
    if: needs.changes.outputs.php84-fpm-mssql == 'true'
    uses: ./.github/workflows/createtest.mssql.yml
    name: fuadkleb/php-mssql:8.4-fpm-mssql
    secrets: inherit
    with:
      source-directory: 8.4/fpm-mssql
      image-tag: fuadkleb/php-mssql:8.4-fpm-mssql
      platforms: linux/amd64, linux/arm64

  build-8_4-fpm-mysql:
    needs: changes
    if: needs.changes.outputs.php84-fpm-mysql == 'true'
    uses: ./.github/workflows/createtest.mysql.yml
    name: fuadkleb/php-mysql:8.4-fpm-mysql
    secrets: inherit
    with:
      source-directory: 8.4/fpm-mysql
      image-tag: fuadkleb/php-mysql:8.4-fpm-mysql
      platforms: linux/amd64, linux/arm64

  build-8_4-fpm-pgsql:
    needs: changes
    if: needs.changes.outputs.php84-fpm-pgsql == 'true'
    uses: ./.github/workflows/createtest.pgsql.yml
    name: fuadkleb/php-pgsql:8.4-fpm-pgsql
    secrets: inherit
    with:
      source-directory: 8.4/fpm-pgsql
      image-tag: fuadkleb/php-pgsql:8.4-fpm-pgsql
      platforms: linux/amd64, linux/arm64

  build-8_4-fpm-nginx-pgsql:
    needs: changes
    if: needs.changes.outputs.php84-fpm-nginx-pgsql == 'true'
    uses: ./.github/workflows/createtest.pgsql.yml
    name: fuadkleb/php-pgsql:8.4-fpm-nginx-pgsql
    secrets: inherit
    with:
      source-directory: 8.4/fpm-nginx-pgsql
      image-tag: fuadkleb/php-pgsql:8.4-fpm-nginx-pgsql
      platforms: linux/amd64, linux/arm64

  build-8_4-fpm-alpine:
    needs: changes
    if: needs.changes.outputs.php84-fpm-alpine == 'true'
    uses: ./.github/workflows/createtest.mssql.yml
    name: fuadkleb/php-mssql:8.4-fpm-alpine
    secrets: inherit
    with:
      source-directory: 8.4/fpm-alpine
      image-tag: fuadkleb/php-mssql:8.4-fpm-alpine
      platforms: linux/amd64

  build-8_4-franken:
    needs: changes
    if: needs.changes.outputs.php84-franken == 'true'
    uses: ./.github/workflows/createtest.mssql.yml
    name: fuadkleb/php-mssql:8.4-franken
    secrets: inherit
    with:
      source-directory: 8.4/franken
      image-tag: fuadkleb/php-mssql:8.4-franken
      platforms: linux/amd64, linux/arm64

  build-8_4-apache-mssql-pgsql:
    needs: changes
    if: needs.changes.outputs.php84-apache-mssql-pgsql == 'true'
    uses: ./.github/workflows/createtest.mssql.yml
    name: fuadkleb/php-mssql:8.4-apache-mssql-pgsql
    secrets: inherit
    with:
      source-directory: 8.4/apache-mssql-pgsql
      image-tag: fuadkleb/php-mssql:8.4-apache-mssql-pgsql
      platforms: linux/amd64, linux/arm64

  # PHP 8.5 Debian
  build-8_5-apache-mssql-pgsql:
    needs: changes
    if: needs.changes.outputs.php85-apache-mssql-pgsql == 'true'
    uses: ./.github/workflows/createtest.mssql.yml
    name: fuadkleb/php-mssql:8.5-apache-mssql-pgsql
    secrets: inherit
    with:
      source-directory: 8.5/apache-mssql-pgsql
      image-tag: fuadkleb/php-mssql:8.5-apache-mssql-pgsql
      platforms: linux/amd64, linux/arm64

  build-8_5-franken:
    needs: changes
    if: needs.changes.outputs.php85-franken == 'true'
    uses: ./.github/workflows/createtest.mssql.yml
    name: fuadkleb/php-mssql:8.5-franken
    secrets: inherit
    with:
      source-directory: 8.5/franken
      image-tag: fuadkleb/php-mssql:8.5-franken
      platforms: linux/amd64, linux/arm64

  # PHP 8.3 Debian
  build-8_3-cli:
    needs: changes
    if: needs.changes.outputs.php83-cli == 'true'
    uses: ./.github/workflows/createtest.mssql.yml
    name: fuadkleb/php-mssql:8.3-cli
    secrets: inherit
    with:
      source-directory: 8.3/cli
      image-tag: fuadkleb/php-mssql:8.3-cli

  build-8_3-fpm:
    needs: changes
    if: needs.changes.outputs.php83-fpm == 'true'
    uses: ./.github/workflows/createtest.mssql.yml
    name: fuadkleb/php-mssql:8.3-fpm
    secrets: inherit
    with:
      source-directory: 8.3/fpm
      image-tag: fuadkleb/php-mssql:8.3-fpm

  # PHP 8.2 Debian
  build-8_2-cli:
    needs: changes
    if: needs.changes.outputs.php82-cli == 'true'
    uses: ./.github/workflows/createtest.mssql.yml
    name: fuadkleb/php-mssql:8.2-cli
    secrets: inherit
    with:
      source-directory: 8.2/cli
      image-tag: fuadkleb/php-mssql:8.2-cli

  build-8_2-fpm:
    needs: changes
    if: needs.changes.outputs.php82-fpm == 'true'
    uses: ./.github/workflows/createtest.mssql.yml
    name: fuadkleb/php-mssql:8.2-fpm
    secrets: inherit
    with:
      source-directory: 8.2/fpm
      image-tag: fuadkleb/php-mssql:8.2-fpm

  build-8_2-fpm-nginx-pgsql:
    needs: changes
    if: needs.changes.outputs.php82-fpm-nginx-pgsql == 'true'
    uses: ./.github/workflows/createtest.pgsql.yml
    name: fuadkleb/php-pgsql:8.2-fpm-nginx-pgsql
    secrets: inherit
    with:
      source-directory: 8.2/fpm-nginx-pgsql
      image-tag: fuadkleb/php-pgsql:8.2-fpm-nginx-pgsql
      platforms: linux/amd64, linux/arm64

  build-8_2-apache:
    needs: changes
    if: needs.changes.outputs.php82-apache == 'true'
    uses: ./.github/workflows/createtest.mssql.yml
    name: fuadkleb/php-mssql:8.2-apache
    secrets: inherit
    with:
      source-directory: 8.2/apache
      image-tag: fuadkleb/php-mssql:8.2-apache
      platforms: linux/amd64, linux/arm64

  build-8_2-apache-mssql-pgsql:
    needs: changes
    if: needs.changes.outputs.php82-apache-mssql-pgsql == 'true'
    uses: ./.github/workflows/createtest.mssql.yml
    name: fuadkleb/php-mssql:8.2-apache-mssql-pgsql
    secrets: inherit
    with:
      source-directory: 8.2/apache-mssql-pgsql
      image-tag: fuadkleb/php-mssql:8.2-apache-mssql-pgsql
      platforms: linux/amd64, linux/arm64

  # PHP 8.0 Debian
  build-8_0-apache-mssql-pgsql:
    needs: changes
    if: needs.changes.outputs.php80-apache-mssql-pgsql == 'true'
    uses: ./.github/workflows/createtest.mssql.yml
    name: fuadkleb/php-mssql:8.0-apache-mssql-pgsql
    secrets: inherit
    with:
      source-directory: 8.0/apache-mssql-pgsql
      image-tag: fuadkleb/php-mssql:8.0-apache-mssql-pgsql
      platforms: linux/amd64

  # PHP 7.4 (PostgreSQL)
  build-7_4-apache:
    needs: changes
    if: needs.changes.outputs.php74-apache == 'true'
    uses: ./.github/workflows/createtest.pgsql.yml
    name: fuadkleb/php-pgsql:7.4-apache
    secrets: inherit
    with:
      source-directory: 7.4/apache-pgsql
      image-tag: fuadkleb/php-pgsql:7.4-apache
      platforms: linux/amd64, linux/arm64
